<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branta Kids - Reading Time</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Branta International School Colors - Cinematic Dark Mode */
            --bg-color: #030b14; /* Deep cinematic blue */
            --text-color: #ffffff;
            --branta-blue: #005ba3;
            --branta-red: #d31820;
            
            /* Unit Colors - Sophisticated palette based on school colors */
            --unit-1: #005ba3; /* Branta Blue */
            --unit-2: #d31820; /* Branta Red */
            --unit-3: #003f73; /* Darker Blue */
            --unit-4: #990f15; /* Darker Red */
            --unit-5: #4fa3e3; /* Light Blue */
            --unit-6: #ff4d4d; /* Bright Red/Coral for the new Unit 6 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            /* Subtle radial gradient for depth */
            background-image: radial-gradient(circle at top right, rgba(0, 91, 163, 0.15), transparent 40%);
        }

        /* Premium Header with Glassmorphism */
        header {
            padding: 15px 50px;
            background: rgba(3, 11, 20, 0.7);
            backdrop-filter: blur(12px); /* Apple-style blur effect */
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: fixed;
            width: 100%;
            z-index: 20;
            display: flex;
            align-items: center;
            transition: background 0.3s ease;
        }

        .school-logo {
            height: 45px;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.6));
            transition: transform 0.3s ease;
        }

        .school-logo:hover {
            transform: scale(1.05);
        }

        /* Elegant Hero Section */
        .hero {
            position: relative;
            height: 40vh;
            display: flex;
            align-items: center;
            padding: 0 50px;
            margin-top: 70px;
            background: linear-gradient(180deg, transparent 0%, var(--bg-color) 100%);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(0, 91, 163, 0.2) 0%, transparent 100%);
            z-index: -1;
        }

        .hero-content h2 {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(to right, #ffffff, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 20px rgba(0,0,0,0.5);
            letter-spacing: -1px;
        }

        .hero-content p {
            font-size: 1.25rem;
            max-width: 600px;
            color: #b3c0d1;
            line-height: 1.5;
            font-weight: 400;
        }

        /* Video Tracks */
        .units-container {
            padding: 10px 0 60px 0;
            position: relative;
            z-index: 5;
        }

        .unit-row {
            margin-bottom: 45px;
            position: relative;
        }

        .unit-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0 50px 15px;
            display: inline-block;
            padding-bottom: 5px;
            letter-spacing: 0.5px;
            color: #f0f0f0;
        }

        /* Dynamic, crisp colors for each Unit line */
        .unit-row:nth-child(1) .unit-title { border-bottom: 3px solid var(--unit-1); }
        .unit-row:nth-child(2) .unit-title { border-bottom: 3px solid var(--unit-2); }
        .unit-row:nth-child(3) .unit-title { border-bottom: 3px solid var(--unit-3); }
        .unit-row:nth-child(4) .unit-title { border-bottom: 3px solid var(--unit-4); }
        .unit-row:nth-child(5) .unit-title { border-bottom: 3px solid var(--unit-5); }
        .unit-row:nth-child(6) .unit-title { border-bottom: 3px solid var(--unit-6); } /* Added Unit 6 Line */

        .carousel {
            display: flex;
            gap: 24px;
            padding: 10px 50px 30px;
            overflow-x: auto;
            scroll-behavior: smooth;
        }

        .carousel::-webkit-scrollbar {
            display: none;
        }
        .carousel {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Refined Video Cards */
        .card {
            min-width: 280px;
            height: 160px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            background-color: #111;
        }

        /* Smooth, cinematic hover */
        .card:hover {
            transform: translateY(-8px) scale(1.04);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 2;
        }

        /* Premium CSS Generated Covers */
        .card-cover {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.6);
            transition: opacity 0.4s ease;
            position: relative;
        }

        /* Adds a dark vignette inside the card for a richer look */
        .card-cover::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.4) 100%);
            z-index: 1;
        }
        
        .card-cover span {
            position: relative;
            z-index: 2; /* Keeps text above the vignette */
        }

        .card:hover .card-cover {
            opacity: 0.15;
        }

        .card-info {
            position: absolute;
            bottom: -60px;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            background: linear-gradient(to top, rgba(3, 11, 20, 0.95), rgba(3, 11, 20, 0.7));
            backdrop-filter: blur(4px);
            transition: bottom 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card:hover .card-info {
            bottom: 0;
        }

        .play-icon {
            width: 28px;
            height: 28px;
            background-color: var(--branta-red);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 0.7rem;
            padding-left: 2px;
            box-shadow: 0 0 10px rgba(211, 24, 32, 0.5);
        }

        .card-info span {
            font-weight: 700;
            font-size: 1.05rem;
            color: white;
        }

        /* Video Player Modal with Fade-in Animation */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(3, 11, 20, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .video-modal.active {
            display: flex;
            opacity: 1;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 25px;
            right: 40px;
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            z-index: 101;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            transform: scale(1.1);
            color: #ffffff;
        }

        video {
            width: 85%;
            max-width: 1100px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            background-color: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            outline: none;
        }
    </style>
</head>
<body>

    <header>
        <img src="https://i.postimg.cc/HkHQQBYN/Logo.png" alt="Branta International School" class="school-logo">
    </header>

    <section class="hero">
        <div class="hero-content">
            <h2>Reading Time</h2>
            <p>Select a unit below and start your reading adventure.</p>
        </div>
    </section>

    <section class="units-container">
        
        <script>
            // --- ATUALIZAÇÃO: Agora são 6 Units! ---
            const units = 6; 
            const readingsPerUnit = 3;

            for (let i = 1; i <= units; i++) {
                let cardsHTML = '';
                
                for (let j = 1; j <= readingsPerUnit; j++) {
                    const videoPath = `Unit ${i}/Reading ${j}.mp4`;
                    
                    // Stylized gradient background for each card
                    const unitColorVar = `var(--unit-${i})`;
                    const cardBackground = `linear-gradient(135deg, ${unitColorVar} 0%, #030b14 120%)`;

                    cardsHTML += `
                        <div class="card" style="background: ${cardBackground};" onclick="openVideo('${videoPath}')">
                            <div class="card-cover">
                                <span>Reading ${j}</span>
                            </div>
                            
                            <div class="card-info">
                                <div class="play-icon">▶</div>
                                <span>Watch Video</span>
                            </div>
                        </div>
                    `;
                }

                const unitHTML = `
                    <div class="unit-row">
                        <h2 class="unit-title">Unit ${i}</h2>
                        <div class="carousel">
                            ${cardsHTML}
                        </div>
                    </div>
                `;
                
                document.write(unitHTML);
            }
        </script>

    </section>

    <div class="video-modal" id="videoModal">
        <span class="close-btn" onclick="closeVideo()">&times;</span>
        <video id="player" controls controlsList="nodownload">
            <source src="" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <script>
        const modal = document.getElementById('videoModal');
        const player = document.getElementById('player');
        const source = player.querySelector('source');

        function openVideo(videoUrl) {
            source.src = videoUrl;
            player.load();
            modal.classList.add('active');
            player.play().catch(e => console.log("Autoplay blocked by browser", e));
        }

        function closeVideo() {
            modal.classList.remove('active');
            setTimeout(() => {
                player.pause();
                player.currentTime = 0; 
            }, 300); // Waits for the fade-out transition before resetting the video
        }

        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                closeVideo();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeVideo();
            }
        });
    </script>
</body>
</html>
